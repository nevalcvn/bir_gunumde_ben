<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bir Günümde Ben</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
/* ═══════════════════════════════════════════════════════════════
   BİR GÜNÜMDE BEN  —  style.css
   ═══════════════════════════════════════════════════════════════ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── CUSTOM PROPERTIES ──────────────────────────────────────── */
:root {
  --text-dark:   #1c1e2e;
  --text-light:  #e8eaf6;

  /* card glass */
  --card-bg:     rgba(255, 255, 255, 0.13);
  --card-border: rgba(255, 255, 255, 0.22);
  --card-hover:  rgba(255, 255, 255, 0.22);

  /* timeline line */
  --line-color:  rgba(255, 255, 255, 0.25);

  /* transitions */
  --bg-speed:    1.8s;
  --ui-speed:    0.35s;
}

/* ── RESET / BASE ───────────────────────────────────────────── */
html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  /* başlangıç rengi — JS sürekli inline style ile günceller */
  background: #A6F1FF;
  color: var(--text-dark);
  overflow-x: hidden;
  position: relative;
}

/* ── ARKA PLAN GEÇİŞ OVERLAY ───────────────────────────────── */
/*
   Arka plan için çift-katman tekniği:
   #bg-overlay pozisyon:fixed, tüm ekranı kaplar ve JS'den
   rgba renkleri alır. CSS transition sayesinde yumuşak geçer.
*/
#bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;
  background: linear-gradient(160deg, #A6F1FF 0%, #80e8ff 100%);
  transition: background var(--bg-speed) cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── YILDIZ CANVAS ──────────────────────────────────────────── */
#stars-canvas {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 2s ease;
}

#stars-canvas.visible {
  opacity: 1;
}

/* ── İLERLEME ÇUBUĞU ───────────────────────────────────────── */
#progress-bar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(
    90deg,
    rgba(255, 255, 255, 0.9),
    rgba(255, 255, 255, 0.3)
  );
  z-index: 1000;
  transition: width 0.12s linear;
}

/* ── STİCKY SAAT ────────────────────────────────────────────── */
#sticky-clock {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255, 255, 255, 0.32);
  border-radius: 50px;
  padding: 7px 22px;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.07em;
  color: inherit;
  z-index: 999;
  white-space: nowrap;
  transition: color var(--bg-speed);
}

/* ── YAN BUTONLAR ───────────────────────────────────────────── */
.side-btn {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid rgba(255, 255, 255, 0.28);
  border-radius: 50px;
  padding: 20px 13px;
  cursor: pointer;
  z-index: 998;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 9px;
  color: inherit;
  transition:
    background var(--ui-speed) ease,
    transform   var(--ui-speed) ease,
    box-shadow  var(--ui-speed) ease,
    opacity     var(--ui-speed) ease;
}

.side-btn:hover {
  background: rgba(255, 255, 255, 0.28);
  transform: translateY(-50%) scale(1.05);
  box-shadow: 0 6px 28px rgba(0, 0, 0, 0.10);
}

.side-btn.active-mode {
  background: rgba(255, 255, 255, 0.32);
  border-color: rgba(255, 255, 255, 0.55);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.20);
}
.side-btn.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-50%) scale(0.85);
}

#btn-left  { left: 16px; }
#btn-right { right: 16px; }

.side-btn .arrow {
  font-size: 1.1rem;
  line-height: 1;
}

.side-btn .label {
  font-size: 0.58rem;
  font-weight: 700;
  letter-spacing: 0.11em;
  text-transform: uppercase;
  writing-mode: vertical-rl;
  text-orientation: mixed;
}

#btn-left .label {
  transform: rotate(180deg);
}

/* ── HEADER ─────────────────────────────────────────────────── */
header {
  text-align: center;
  padding: 94px 24px 56px;
}

.mode-badge {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  background: rgba(255, 255, 255, 0.20);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 50px;
  padding: 5px 16px;
  margin-bottom: 18px;
}

.day-icon {
  display: block;
  font-size: 3.2rem;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.08));
  transition: all 0.5s ease;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5.5vw, 4.6rem);
  font-weight: 900;
  line-height: 1.06;
  color: inherit;
  transition: color var(--bg-speed);
}

header h1 span {
  font-style: italic;
}

.header-sub {
  margin: 16px auto 0;
  max-width: 500px;
  font-size: 0.95rem;
  font-weight: 300;
  line-height: 1.75;
  opacity: 0.72;
}

.scroll-hint {
  margin-top: 38px;
  font-size: 0.75rem;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  opacity: 0.45;
  animation: bounce 2.2s ease-in-out infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(7px); }
}

/* ── TİMELINE WRAPPER ───────────────────────────────────────── */
.timeline {
  position: relative;
  max-width: 780px;
  margin: 0 auto;
  padding: 16px 24px 300px;
}

/* dikey çizgi */
.timeline::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 1.5px;
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.50) 0%,
    rgba(255, 255, 255, 0.08) 100%
  );
  transform: translateX(-50%);
}

/* geçiş sırasında soluklaşma */
.timeline-panel {
  transition: opacity 0.38s ease;
}

.timeline-panel.fading {
  opacity: 0;
  pointer-events: none;
}

/* ── ZAMAN BLOĞU ────────────────────────────────────────────── */
.time-block {
  position: relative;
  display: flex;
  align-items: flex-start;
  margin-bottom: 220px;
  opacity: 0;
  transform: translateY(60px);
  transition:
    opacity  0.20s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.20s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Her blok biraz gecikmeli gelsin — sıralı efekt */
.time-block:nth-child(1)  { transition-delay: 0s; }
.time-block:nth-child(2)  { transition-delay: 0.08s; }
.time-block:nth-child(3)  { transition-delay: 0.08s; }
.time-block:nth-child(4)  { transition-delay: 0.08s; }
.time-block:nth-child(5)  { transition-delay: 0.08s; }
.time-block:nth-child(6)  { transition-delay: 0.08s; }
.time-block:nth-child(7)  { transition-delay: 0.08s; }
.time-block:nth-child(8)  { transition-delay: 0.08s; }
.time-block:nth-child(9)  { transition-delay: 0.08s; }
.time-block:nth-child(10) { transition-delay: 0.08s; }

.time-block.visible {
  opacity: 1;
  transform: translateY(0);
}

/* her ikinci blok ters */
.time-block:nth-child(odd)  { flex-direction: row; }
.time-block:nth-child(even) { flex-direction: row-reverse; }

/* ── SAAT ETİKETİ ───────────────────────────────────────────── */
.time-label-wrap {
  width: 50%;
  padding: 0 34px;
  padding-top: 6px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.time-block:nth-child(even) .time-label-wrap {
  align-items: flex-start;
}

.time-label {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.92);
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.10);
  line-height: 1;
}

.time-phase {
  font-size: 0.67rem;
  font-weight: 600;
  letter-spacing: 0.11em;
  text-transform: uppercase;
  opacity: 0.62;
  margin-top: 5px;
}

/* ── ORTA NOKTA ─────────────────────────────────────────────── */
.dot {
  position: absolute;
  left: 50%;
  top: 20px;
  transform: translateX(-50%);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.85);
  border: 2.5px solid rgba(255, 255, 255, 0.40);
  box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.12);
  z-index: 2;
  transition: transform 0.28s ease;
}

.time-block:hover .dot {
  transform: translateX(-50%) scale(1.45);
}

/* ── KART WRAPPER ───────────────────────────────────────────── */
.card-wrap {
  width: 50%;
  padding: 0 34px;
  position: relative;
}

/* ── KART ────────────────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  cursor: pointer;
  overflow: hidden;
  transition:
    transform    0.28s ease,
    box-shadow   0.28s ease,
    background   0.28s ease,
    border-color 0.28s ease;
}

.card:hover {
  transform: translateY(-4px) scale(1.018);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.10);
  background: var(--card-hover);
  border-color: rgba(255, 255, 255, 0.38);
}

/* ── KART BAŞLIĞI ───────────────────────────────────────────── */
.card-header {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 16px 18px;
}

.card-emoji {
  font-size: 1.9rem;
  line-height: 1;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.08));
}

.card-title {
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1.35;
}

.card-subtitle {
  display: none;
}

.card-chevron {
  margin-left: auto;
  font-size: 0.82rem;
  opacity: 0.45;
  flex-shrink: 0;
  transition:
    transform var(--ui-speed) ease,
    opacity   var(--ui-speed) ease;
}

.card.open .card-chevron {
  transform: rotate(180deg);
  opacity: 0.85;
}

/* ── DETAY PANELİ ───────────────────────────────────────────── */
.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.49s cubic-bezier(0.4, 0, 0.2, 1);
}

.card.open .card-detail {
  max-height: 1400px;
}

.card-detail-inner {
  padding: 4px 18px 18px;
  border-top: 1px solid rgba(255, 255, 255, 0.20);
}

.detail-row {
  margin-top: 13px;
}

.detail-label {
  font-size: 0.63rem;
  font-weight: 700;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  opacity: 0.52;
  margin-bottom: 5px;
}

.detail-text {
  font-size: 0.83rem;
  font-weight: 400;
  line-height: 1.7;
}

.thought-text {
  font-style: italic;
  font-size: 0.80rem;
  line-height: 1.65;
  opacity: 0.78;
  border-left: 2px solid rgba(255, 255, 255, 0.38);
  padding-left: 10px;
  margin-top: 3px;
}

/* ── KAYDIRMA ÇUBUĞU ────────────────────────────────────────── */
.thought-bubble {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: calc(100% + 14px);
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: rgba(28, 30, 46, 0.88);
  border-radius: 18px;
  padding: 12px 16px;
  font-size: 0.80rem;
  font-style: italic;
  line-height: 1.6;
  width: max-content;
  max-width: 260px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.13);
  z-index: 100;
}
.thought-bubble::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  border-width: 0 8px 8px 8px;
  border-style: solid;
  border-color: transparent transparent rgba(255,255,255,0.92) transparent;
}
.thought-bubble::after {
  content: '💭';
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1rem;
}
.thought-bubble.visible {
  display: block;
  animation: bubblePop 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes bubblePop {
  from { opacity: 0; transform: translateX(-50%) scale(0.85) translateY(-6px); }
  to   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
}

/* ── OTOBÜS ANİMASYONU ── */
#bus-widget {
  width: 100%;
  height: 36px;
  position: relative;
  overflow: hidden;
  margin: 10px 0 4px;
  pointer-events: none;
}
#bus-icon {
  position: absolute;
  font-size: 1.6rem;
  top: 0;
  left: -10%;
  transition: none;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
}

/* ── DÖNÜŞ OTOBÜSÜ ── */
#return-bus-widget {
  width: 100%;
  height: 36px;
  position: relative;
  overflow: hidden;
  margin: 10px 0 4px;
  pointer-events: none;
}
#return-bus-icon {
  position: absolute;
  font-size: 1.6rem;
  top: 0;
  left: -15%;
  transition: none;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
}

/* ── AYAK İZİ ANİMASYONU ── */
#footprint-widget {
  width: 100%;
  height: 50px;
  position: relative;
  overflow: hidden;
  margin: 10px 0 4px;
  pointer-events: none;
}
.footprint {
  position: absolute;
  opacity: 0;
  transition: opacity 0.35s ease;
  width: 38px;
  height: 22px;
}
.foot-right { top: 4px; }
.foot-left  { top: 22px; }

.footprint svg {
  width: 100%;
  height: 100%;
  fill: currentColor;
  opacity: 0.55;
}

/* ── NOT DEFTERİ ── */
.notebook {
  background: #fffef0;
  border: 1.5px solid rgba(0,0,0,0.10);
  border-radius: 8px;
  padding: 10px 14px;
  margin-top: 10px;
  font-family: 'Inter', monospace;
  font-size: 0.75rem;
  color: #333;
  line-height: 1.9;
  position: relative;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.06);
}
.notebook::before {
  content: '';
  position: absolute;
  left: 28px; top: 0; bottom: 0;
  width: 1.5px;
  background: rgba(180,180,255,0.5);
}
.notebook-line {
  padding-left: 18px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  min-height: 22px;
}
.notebook-title {
  font-weight: 700;
  font-size: 0.7rem;
  color: #666;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
  padding-left: 18px;
}

/* ── İÇECEK SEÇİCİ ── */
.drink-picker {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.drink-btn {
  flex: 1;
  border: none;
  border-radius: 50px;
  padding: 7px 10px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.04em;
}
.drink-btn.lemon {
  background: rgba(255,240,80,0.35);
  color: #7a6500;
  border: 1.5px solid rgba(255,220,0,0.5);
}
.drink-btn.coffee {
  background: rgba(140,80,30,0.18);
  color: #5c3010;
  border: 1.5px solid rgba(140,80,30,0.35);
}
.drink-btn.active-lemon {
  background: rgba(255,235,50,0.7);
  border-color: #e6c800;
  box-shadow: 0 0 12px rgba(255,220,0,0.4);
}
.drink-btn.active-coffee {
  background: rgba(140,80,30,0.55);
  color: #fff;
  border-color: #8c501e;
  box-shadow: 0 0 12px rgba(140,80,30,0.35);
}

/* ── KARANKIK MOD ── */
.dark-toggle-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  background: rgba(255,255,255,0.18);
  border: 1.5px solid rgba(255,255,255,0.30);
  border-radius: 50px;
  padding: 6px 14px;
  font-size: 0.75rem;
  font-weight: 600;
  cursor: pointer;
  color: inherit;
  transition: all 0.4s ease;
  width: fit-content;
}
.dark-toggle-btn:hover {
  background: rgba(255,255,255,0.28);
}
.dark-mode-active .card {
  background: rgba(10, 10, 30, 0.88) !important;
  border-color: rgba(80,120,255,0.4) !important;
}
.dark-mode-active .card-title,
.dark-mode-active .card-subtitle,
.dark-mode-active .detail-text,
.dark-mode-active .detail-label,
.dark-mode-active .time-label,
.dark-mode-active .time-phase {
  color: rgba(160,200,255,0.9) !important;
}
.dark-mode-active .detail-text {
  font-family: monospace;
  font-size: 0.78rem;
  color: #7fffb2 !important;
}
.dark-toggle-btn.lit {
  background: rgba(10,10,30,0.75);
  border-color: rgba(80,120,255,0.5);
  color: #7fffb2;
  box-shadow: 0 0 16px rgba(80,120,255,0.3);
}
.code-editor {
  margin-top: 12px;
  border-radius: 10px;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  font-size: 0.72rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.editor-titlebar {
  background: #2d2d2d;
  padding: 7px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.editor-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.editor-dot.red    { background: #ff5f57; }
.editor-dot.yellow { background: #febc2e; }
.editor-dot.green  { background: #28c840; }
.editor-filename {
  color: #aaa;
  font-size: 0.68rem;
  margin-left: 8px;
  letter-spacing: 0.04em;
}
.editor-body {
  background: #1e1e2e;
  padding: 10px 14px;
  line-height: 1.75;
}
.editor-line {
  display: flex;
  gap: 10px;
  white-space: pre;
}
.ln  { color: #555; min-width: 14px; text-align: right; user-select: none; }
.kw  { color: #c792ea; }
.mod { color: #82aaff; }
.fn  { color: #82cfff; }
.str { color: #c3e88d; }
.cm  { color: #546e7a; font-style: italic; }

.music-player {
  margin-top: 12px;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
}

.music-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  transition: background 0.2s;
}
.music-toggle:hover { background: rgba(255,255,255,0.12); }
.music-icon { font-size: 1.2rem; }
.music-toggle-text { flex: 1; }
.music-arrow {
  font-size: 0.75rem;
  opacity: 0.6;
  transition: transform 0.3s ease;
}

.playlist {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.49s cubic-bezier(0.4,0,0.2,1);
  background: rgba(0,0,0,0.18);
}
.playlist.open {
  max-height: 260px;
  overflow-y: auto;
}
.playlist.open::-webkit-scrollbar { width: 4px; }
.playlist.open::-webkit-scrollbar-track { background: transparent; }
.playlist.open::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 2px; }

.playlist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px 6px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.6;
  border-bottom: 1px solid rgba(255,255,255,0.10);
}
.playlist-count { font-weight: 400; }

.playlist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.playlist-item:hover { background: rgba(255,255,255,0.08); }

/* ── YILDIZ ANİMASYONU ────────────────────────────────────────────────────── */
const canvas = document.getElementById('stars-canvas');
const ctx    = canvas.getContext('2d');
let   stars  = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars() {
  stars = Array.from({ length: 130 }, () => ({
    x:     Math.random() * canvas.width,
    y:     Math.random() * canvas.height,
    r:     Math.random() * 1.6 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.005 + 0.002,
  }));
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.phase += s.speed;
    const alpha = 0.25 + Math.abs(Math.sin(s.phase)) * 0.65;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(220, 225, 255, ${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

resizeCanvas();
initStars();
drawStars();
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

/**
 * İki RGB dizisi arasında t (0-1) oranında lineer interpolasyon.
 */
function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

/**
 * #bg-overlay'e yumuşak gradient uygula.
 * RAF döngüsüyle currentRGB → targetRGB'ye easing ile ilerler.
 */
function applyBackground(startRGB, endRGB) {
  const overlay = document.getElementById('bg-overlay');
  const s = startRGB.join(',');
  const e = endRGB.join(',');
  overlay.style.background = `linear-gradient(160deg, rgb(${s}) 0%, rgb(${e}) 100%)`;
}

const LERP_SPEED = 0.028; // küçüldükçe daha yavaş / yumuşak geçiş

function animateBackground() {
  if (!currentRGB || !targetRGB) return;

  const newStart = lerpColor(currentRGB.start, targetRGB.start, LERP_SPEED);
  const newEnd   = lerpColor(currentRGB.end,   targetRGB.end,   LERP_SPEED);

  currentRGB.start = newStart;
  currentRGB.end   = newEnd;

  applyBackground(newStart, newEnd);

  const doneStart = newStart.every((v, i) => Math.abs(v - targetRGB.start[i]) < 1);
  const doneEnd   = newEnd.every(  (v, i) => Math.abs(v - targetRGB.end[i])   < 1);

  if (doneStart && doneEnd) {
    cancelAnimationFrame(rafId);
    rafId = null;
  } else {
    rafId = requestAnimationFrame(animateBackground);
  }
}

function transitionToZone(zoneIdx) {
  let zoneSet;
  if (isDarkTheme) {
    zoneSet = currentMode === 'weekend' ? ZONES_DARK_WEEKEND : ZONES_DARK_WEEKDAY;
  } else {
    zoneSet = currentMode === 'weekend' ? ZONES_WEEKEND : ZONES;
  }
  const zone = zoneSet[zoneIdx];

  if (!currentRGB) {
    currentRGB = { start: [...zone.start], end: [...zone.end] };
    applyBackground(currentRGB.start, currentRGB.end);
    return;
  }

  targetRGB = { start: [...zone.start], end: [...zone.end] };

  if (!rafId) rafId = requestAnimationFrame(animateBackground);
}

                  <div class="thought-text">${block.thought}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      // kart aç/kapat
      const card = div.querySelector('.card');
      card.addEventListener('click', () => toggleCard(card));

        if (e.key === 'Enter' || e.key === ' ') toggleCard(card);

      injectWidgets(div, block, i);

        holdProgress += 100;
        const pct = Math.min((holdProgress / 3000) * 100, 100);
        btn.style.background = `linear-gradient(90deg, rgba(0,200,80,0.45) ${pct}%, rgba(255,50,50,0.18) ${pct}%)`;
        status.textContent = `⏳ İmha ediliyor... %${Math.round(pct)}`;
      }, 100);
      holdTimer = setTimeout(() => {
        clearInterval(holdInterval);
        clearTimeout(spikeTimer);
        phase = 2;
        btn.classList.remove('armed');
        btn.style.background = '';
        btn.querySelector('span').textContent = '✅ İmha!';
        status.textContent = '✅ Spike imha edildi! Tur bizde!';
        triggerExplosionParticles(e.clientX, e.clientY, true);
        triggerBigExplosion(e.clientX, e.clientY, false);
        setTimeout(() => resetSpike(), 2500);
      }, 3000);
    });

    // Bırakınca iptal
    btn.addEventListener('mouseup',   (e) => { e.stopPropagation(); if (phase===1 && holdTimer) { clearTimeout(holdTimer); clearInterval(holdInterval); btn.style.background=''; btn.querySelector('span').textContent='3sn basılı tut!'; status.textContent='🔴 Spike kuruldu — 7sn içinde imha et!'; } });
    btn.addEventListener('mouseleave',(e) => { e.stopPropagation(); if (phase===1 && holdTimer) { clearTimeout(holdTimer); clearInterval(holdInterval); btn.style.background=''; btn.querySelector('span').textContent='3sn basılı tut!'; status.textContent='🔴 Spike kuruldu — 7sn içinde imha et!'; } });

    // Mobil dokunmatik
    btn.addEventListener('touchstart',(e) => { e.stopPropagation(); btn.dispatchEvent(new MouseEvent('mousedown',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})); }, {passive:true});
    btn.addEventListener('touchend',  (e) => { e.stopPropagation(); btn.dispatchEvent(new MouseEvent('mouseup')); }, {passive:true});
  }

  // --- KARANLIK MOD BUTONU (19:30 ders çalışma) ---
  if (block.time === '19:30') {
    const btn = document.createElement('button');
    btn.className = 'dark-toggle-btn';
    btn.innerHTML = '💡 Gece Lambası';
    btn.onclick = function() { toggleDarkMode(div, btn); };
    detailInner.appendChild(btn);
  }
}

function animateFootprints() {
  const widget = document.getElementById('footprint-widget');
  if (!widget) return;
  if (fpTimer) clearInterval(fpTimer);

  widget.innerHTML = '';

  // Karanlık modda sağdan sola (geri geri), aydınlık modda soldan sağa
  const reverse = isDarkTheme;
  const stepSize = reverse ? -8 : 8;
  let nextPos = reverse ? 90 : 2;
  let prints = [];
  let isRight = true;

  fpTimer = setInterval(() => {
    const fp = document.createElement('div');
    fp.className = 'footprint ' + (isRight ? 'foot-right' : 'foot-left');
    fp.innerHTML = isRight ? FOOT_RIGHT_SVG : FOOT_LEFT_SVG;
    fp.style.left = nextPos + '%';
    widget.appendChild(fp);

    requestAnimationFrame(() => { fp.style.opacity = '1'; });

    prints.push(fp);
    nextPos += stepSize;
    isRight = !isRight;

    if (prints.length > 2) {
      const old = prints.shift();
      old.style.opacity = '0';
      setTimeout(() => old.remove(), 350);
    }

    const ended = reverse ? (nextPos < 2) : (nextPos > 90);
    if (ended) {
      nextPos = reverse ? 90 : 2;
      isRight = true;
      prints.forEach(p => {
        p.style.opacity = '0';
        setTimeout(() => p.remove(), 350);
      });
      prints = [];
    }
  }, 600);
}

let retBusAnimId = null;
let retBusTimer  = null;

function animateReturnBus() {
  const bus = document.getElementById('return-bus-icon');
  if (!bus) return;

  if (retBusAnimId) cancelAnimationFrame(retBusAnimId);
  if (retBusTimer) clearTimeout(retBusTimer);

  bus.style.transition = 'none';

  // Aydınlık: soldan sağa (eve dönüş), karanlık: sağdan sola (ters)
  const goRight = !isDarkTheme;
  let pos    = goRight ? -15 : 110;
  const endPos = goRight ? 110 : -15;
  const dir  = goRight ? 0.4 : -0.4;

/* ── INTERSECTION OBSERVER ────────────────────────────────────────────────── */
function observeBlocks() {
  const blocks = document.querySelectorAll('.time-block');
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), 20);
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.10, rootMargin: '0px 0px -60px 0px' });

  blocks.forEach(b => obs.observe(b));
}

/* ── SCROLL → ZONE ────────────────────────────────────────────────────────── */
function updateZoneFromScroll() {
  // Scroll yönünü tespit et
  const currentY = window.scrollY;
  const scrollingDown = currentY > lastScrollY;
  lastScrollY = currentY;

  const data   = currentMode === 'weekday' ? WEEKDAY : WEEKEND;
  const clocks = CLOCK_LABELS[currentMode];
  const blocks = document.querySelectorAll('.time-block');

  // İlerleme çubuğu
  const scrollTop = window.scrollY;
  const docH      = document.documentElement.scrollHeight - window.innerHeight;
  const pct       = docH > 0 ? (scrollTop / docH) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';

  // Hangi blok ekranın ortasına en yakın?
  // Aktif blok = viewport ortasına en yakın olan
  let activeIdx = 0;
  let minDist = Infinity;
  const viewportCenter = window.innerHeight / 2;
  blocks.forEach((b, i) => {
    const rect = b.getBoundingClientRect();
    const blockCenter = rect.top + rect.height / 2;
    const dist = Math.abs(blockCenter - viewportCenter);
    if (dist < minDist) {
      minDist = dist;
      activeIdx = i;
    }
  });

  const zoneIdx = data[activeIdx]?.zone ?? 0;

  // Saat etiketi güncelle
  // Karanlık modda veri ters — clock index'i de ters al
  const maxIdx   = clocks.length - 1;
  const clockIdx = isDarkTheme
    ? Math.max(0, maxIdx - activeIdx)
    : Math.min(activeIdx, maxIdx);
  const clock    = document.getElementById('sticky-clock');
  clock.textContent = clocks[clockIdx][0] + ' ' + clocks[clockIdx][1];

  // Enerji ve terminal — clock'un gösterdiği saate göre
  const clockTime = clocks[clockIdx][0];
  const activeBlockTime = getCurrentData()[activeIdx]?.time;
  if (activeBlockTime) {
    updateEnergyBar(activeBlockTime);
    updateTerminalForBlock(activeBlockTime, scrollingDown);
  }

  // Yıldızlar her scroll'da kontrol edilsin — zone'dan bağımsız
  const curBlockTime = getCurrentData()[activeIdx]?.time;
  setNightMode(curBlockTime === '00:00' || curBlockTime === '00:30');

  if (zoneIdx === currentZoneIdx) return;
  currentZoneIdx = zoneIdx;

  transitionToZone(zoneIdx);
  updateTextColor(zoneIdx);


}

window.addEventListener('scroll', updateZoneFromScroll, { passive: true });

/* ── SPİKE PATLAMA EFEKTLERİ ── */
function triggerExplosionParticles(x, y, big) {
  const colors = big
    ? ['#ff4444','#ff8800','#ffcc00','#ff6600','#ffffff']
    : ['#ff4444','#cc0000','#ff6666'];
  const count = big ? 18 : 8;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / count) * Math.PI * 2;
    const dist  = big ? (60 + Math.random()*80) : (30 + Math.random()*40);
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    p.style.cssText = `
      left:${x}px; top:${y}px;
      background:${colors[i % colors.length]};
      transform-origin: center;
    `;
    p.style.setProperty('--tx', tx + 'px');
    p.style.setProperty('--ty', ty + 'px');
    p.style.animation = `particleFly ${0.5 + Math.random()*0.4}s ease-out forwards`;
    p.style.transform = `translate(${tx}px, ${ty}px)`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

function triggerBigExplosion(x, y, fail) {
  const emojis = fail ? ['💥','💀','🔥','💥'] : ['💥','✨','🎉','💥'];
  emojis.forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'explosion';
    el.textContent = emoji;
    el.style.left = (x + (i-1.5)*28) + 'px';
    el.style.top  = y + 'px';
    el.style.animationDelay = (i * 0.08) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  });

  const txt = document.createElement('div');
  txt.className = 'explosion-text';
  txt.textContent = fail ? '💀 SPIKE PATLADI! TUR KAYBEDILDI!' : '✅ SPIKE İMHA! TUR BİZDE!';
  txt.style.left = x + 'px';
  txt.style.top  = y + 'px';
  document.body.appendChild(txt);
  setTimeout(() => txt.remove(), 1500);
}

let lastLoggedTime = null;
let scrollLogCount = 0;

function clearTerminal() {
  return new Promise(resolve => {
    const body = document.getElementById('terminal-body');
    if (!body) { resolve(); return; }

    // Kalıcı sistem mesajlarını sakla
    const persistLines = Array.from(body.querySelectorAll('[data-persist="true"]'))
                              .map(el => el.cloneNode(true));

    // $ clear yaz
    const clearLine = document.createElement('div');
    clearLine.className = 't-line t-system';
    clearLine.textContent = '$ clear';
    body.appendChild(clearLine);
    body.scrollTop = body.scrollHeight;

    setTimeout(() => {
      body.innerHTML = '';
      // Kalıcı mesajları geri koy
      persistLines.forEach(el => body.appendChild(el));
      // Ayırıcı
      const sep = document.createElement('div');
      sep.className = 't-line t-system';
      sep.style.opacity = '0.35';
      sep.textContent = '──────────────────────────────';
      body.appendChild(sep);
      // $ clear
      const saved = clearLine.cloneNode(true);
      body.appendChild(saved);
      // cursor
      const c = document.createElement('div');
      c.className = 't-line t-cursor';
      c.textContent = '▌';
      body.appendChild(c);
      body.scrollTop = body.scrollHeight;
      resolve();
    }, 300);
  });
}

function addTerminalLog(type, msg, persist) {
  const body   = document.getElementById('terminal-body');
  if (!body) return;
  const cursor = body.querySelector('.t-cursor');
  const line   = document.createElement('div');
  line.className = `t-line t-${type}`;
  line.textContent = msg;
  if (persist) line.dataset.persist = 'true';
  if (cursor) body.insertBefore(line, cursor);
  else body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}

let blockChangeCount = 0;

function updateTerminalForBlock(time, scrollDown) {
  if (lastLoggedTime === 'LOCKED') return;
  if (time === lastLoggedTime) return;

  // Yön tespit et — önceki saat sonra geliyorsa aşağı, önceyse yukarı
  const prevTime = lastLoggedTime;
  lastLoggedTime = time;
  blockChangeCount++;

  let logs;
  if (isDarkTheme) {
    logs = currentMode === 'weekday' ? DARK_WEEKDAY_LOGS : DARK_WEEKEND_LOGS;
  } else {
    logs = currentMode === 'weekday' ? WEEKDAY_LOGS : WEEKEND_LOGS;
  }
  if (logs[time]) addTerminalLog(logs[time].type, logs[time].msg);

  // Her 2 blok değişiminde bir scroll yön mesajı ekle
  if (prevTime && blockChangeCount % 2 === 0) {
    const goingDown = scrollDown;
    let pool;
    if (isDarkTheme) {
      pool = goingDown ? DARK_SCROLL_DOWN : DARK_SCROLL_UP;
    } else {
      pool = goingDown ? SCROLL_DOWN_LIGHT : SCROLL_UP_LIGHT;
    }
    const l = pool[Math.floor(Math.random() * pool.length)];
    addTerminalLog(l.type, l.msg);
  }
}

        setTimeout(() => addTerminalLog('log', '[INFO] Kronolojik sıra yeniden kuruldu. Hayat normale döndü.', true), 800);
      }
    }
  });

  // 2) Timeline rebuild + sayfa başa scroll
  buildTimeline(getCurrentData());

}

function getCurrentData() {
